<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GA Engine</title>
    <style>
      * { box-sizing: border-box; }
      html { height: 100%; }
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #0A0E1A;
        color: #F1F5F9;
        font-family: 'Inter', sans-serif;
        /* REMOVED overflow:hidden — was causing white screen */
      }
      #root {
        height: 100%;
        min-height: 100vh;
      }
      /* Loading splash shown before React hydrates */
      #splash {
        position: fixed;
        inset: 0;
        background: #0A0E1A;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      .spinner {
        width: 40px; height: 40px;
        border: 3px solid #1e293b;
        border-top-color: #6366F1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .splash-logo {
        width: 48px; height: 48px;
        background: linear-gradient(135deg, #6366F1, #10B981);
        border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        font-size: 24px;
      }
      .splash-title { color: #F1F5F9; font-weight: 700; font-size: 1.1rem; }
      .splash-sub { color: #475569; font-size: 0.8rem; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0A0E1A; }
      ::-webkit-scrollbar-thumb { background: #2D3748; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #6366F1; }
    </style>
  </head>
  <body>
    <!-- Splash screen shown while React loads -->
    <div id="splash">
      <div class="splash-logo">&#9196;</div>
      <div class="splash-title">GA Engine</div>
      <div class="spinner"></div>
      <div class="splash-sub">Starting up...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide splash once React mounts
      window.__hideSplash = function() {
        var s = document.getElementById('splash');
        if (s) { s.classList.add('hidden'); setTimeout(function(){ s.remove(); }, 500); }
      };
      // Fallback: hide after 8s even if React hangs
      setTimeout(window.__hideSplash, 8000);
    </script>
  </body>
</html>
